        <script>

            function addSummaryItem (item) {
              var container = $('#summary ul'), 
                  itemTemplate = $('#templates .summary-item');

              var newItem = itemTemplate.clone().appendTo(container);
              // newItem.find('.description').text(item.description);
              // newItem.find('.date').text(item.date);
              // newItem.find('.time').text(item.time);
              // newItem.find('.meterRead').text(item.meterRead);
              // newItem.find('.intervalUsagekWhLastYear').text(item.intervalUsagekWhLastYear);
              newItem.find('.intervalUsagekWh').text(item.intervalUsagekWh);
              // newItem.find('.dayOfWeek').text(item.dayOfWeek);
              // newItem.find('.timeOfDay').text(item.timeOfDay);
              newItem.find('.pricing').text(item.pricing);
              newItem.find('.cost').text("$"+item.cost+"/kWh");
            }
             


            function addSimData () {
              // create simulate data

              // TODO: get previous time from last time created
              var newData = {
                date: "today",
                time: "4:15",
                meterRead: 23,
                intervalUsagekWh: 180 + Math.round(Math.random()*(50)),
                intervalUsagekWhLastYear: 25,
                dayOfWeek: "Mon",
                timeOfDay: "1-3pm",
                pricing: "peak",
                cost: 0.13
              }

              // alert (newData.pricing);


              // add the data
              addSummaryItem(newData);


            }  

            // Jquery Document Ready function 
            // -------------------------------

            $( document ).ready(function() {

              var start = new Date;
              var timer = 0;
              setInterval(function() {
                  $('#Timer').text(Math.round((new Date - start) / 1000) + " min");
              }, 1000);

              // nothing
              setInterval(function () {
                addSimData();
              }, 3000);
              
            }); // End Document Ready function

      </script>
